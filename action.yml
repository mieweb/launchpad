name: MIEWeb LaunchPad
description: Manage Containers via API
author: mieweb
branding:
  icon: "package"
  color: "purple"

inputs:
  api_key:
    description: "API Key for authentication"
    required: true
  api_url:
    description: "Base URL for the Container API"
    required: true
  template_name:
    description: "Container template (e.g., ghcr.io/mieweb/timeharbor:latest)"
    required: false
  container_env_vars:
    description: "Environment variables to set inside the container (JSON string)"
    required: false
  services:
    description: "Services configuration (JSON array)"
    required: false
  site_id:
    description: "Site ID for the container management system"
    required: false
    default: "1"

runs:
  using: "composite"
  steps:
    - name: Validate Required Inputs
      shell: bash
      env:
        API_KEY: ${{ inputs.api_key }}
        API_URL: ${{ inputs.api_url }}
      run: |
        missing=()
        [ -z "$API_KEY" ] && missing+=("api_key")
        [ -z "$API_URL" ] && missing+=("api_url")
        if [ ${#missing[@]} -gt 0 ]; then
          echo "::error::Missing required input(s): ${missing[*]}"
          exit 1
        fi

    - name: Check if action should run
      shell: bash
      id: should-run
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_CREATED: ${{ github.event.created }}
      run: |
        if [[ "$GITHUB_EVENT_NAME" != "push" ]] || [[ "$GITHUB_EVENT_CREATED" == "false" ]]; then
          echo "should_run=true" >> $GITHUB_OUTPUT
        else
          echo "should_run=false" >> $GITHUB_OUTPUT
          echo "Skipping action: Push event with created=true"
        fi

    - name: Determine Target Branch Name
      shell: bash
      id: branch-name
      if: steps.should-run.outputs.should_run == 'true'
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_EVENT_REF: ${{ github.event.ref }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
      run: |
        if [[ "$GITHUB_EVENT_NAME" == "delete" ]]; then
          TARGET_BRANCH="$GITHUB_EVENT_REF"
          echo "Using deleted branch name: $TARGET_BRANCH"
        elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
          TARGET_BRANCH="$GITHUB_HEAD_REF"
          echo "Using pull request head branch: $TARGET_BRANCH"
        else
          TARGET_BRANCH="$GITHUB_REF_NAME"
          echo "Using current branch name: $TARGET_BRANCH"
        fi
        echo "target_branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT

    # в”Ђв”Ђ Phase 1: Create or locate the container в”Ђв”Ђ
    - name: Create or Locate Container
      id: manage-container
      shell: bash
      if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'create' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')) && steps.should-run.outputs.should_run == 'true' }}
      env:
        API_URL: ${{ inputs.api_url }}
        API_KEY: ${{ inputs.api_key }}
        TEMPLATE_NAME: ${{ inputs.template_name }}
        SITE_ID: ${{ inputs.site_id }}
        SERVICES: ${{ inputs.services }}
        CONTAINER_ENV_VARS: ${{ inputs.container_env_vars }}
        GITHUB_REPOSITORY_FULL: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        TARGET_BRANCH: ${{ steps.branch-name.outputs.target_branch }}
      run: |
        # 1. Generate Container Name
        REPO_NAME=$(basename "$GITHUB_REPOSITORY_FULL")
        CONTAINER_NAME="${GITHUB_REPOSITORY_OWNER}-${REPO_NAME}-${TARGET_BRANCH}"
        CONTAINER_NAME=${CONTAINER_NAME,,}
        CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')

        # Truncate to 63 chars (DNS label limit): keep first 54 chars, append dash + 8-char hash of the rest
        if [ ${#CONTAINER_NAME} -gt 63 ]; then
          PART1="${CONTAINER_NAME:0:54}"
          PART2="${CONTAINER_NAME:54}"
          NAME_HASH=$(printf '%s' "$PART2" | sha256sum | cut -c1-8)
          CONTAINER_NAME="${PART1}-${NAME_HASH}"
        fi

        echo "container_name=$CONTAINER_NAME" >> $GITHUB_OUTPUT
        echo "Managing Container: $CONTAINER_NAME"

        # Normalize template tag: replace slashes with hyphens to match docker/metadata-action behavior
        if [[ "$TEMPLATE_NAME" == *:* ]]; then
          TEMPLATE_BASE="${TEMPLATE_NAME%:*}"
          TEMPLATE_TAG="${TEMPLATE_NAME##*:}"
          TEMPLATE_TAG=$(echo "$TEMPLATE_TAG" | sed 's|/|-|g')
          TEMPLATE_NAME="${TEMPLATE_BASE}:${TEMPLATE_TAG}"
        fi

        # 2. Check for existing container
        echo "Querying API: $API_URL/api/v1/sites/$SITE_ID/containers?hostname=$CONTAINER_NAME"

        EXISTING_CONTAINER=$(curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
          "$API_URL/api/v1/sites/$SITE_ID/containers?hostname=$CONTAINER_NAME")

        echo "--- RAW API RESPONSE ---"
        echo "$EXISTING_CONTAINER"
        echo "------------------------"

        CONTAINER_ID=$(echo "$EXISTING_CONTAINER" | jq -r '.data[0].containerId // .data[0].id // empty')
        NEEDS_CREATE="false"

        if [ -n "$CONTAINER_ID" ] && [ "$CONTAINER_ID" != "null" ]; then
          if [ -n "$TEMPLATE_NAME" ]; then
            echo "Container already exists (ID: $CONTAINER_ID). Deleting to recreate with updated configuration..."
            DELETE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE "$API_URL/api/v1/sites/$SITE_ID/containers/$CONTAINER_ID" \
              -H "Authorization: Bearer $API_KEY" \
              -H "Accept: application/json")

            if [ "$DELETE_CODE" -ge 200 ] && [ "$DELETE_CODE" -lt 300 ]; then
              echo "Existing container deleted successfully."
              NEEDS_CREATE="true"
            else
              echo "::error::Failed to delete existing container for update. HTTP: $DELETE_CODE"
              echo "FAILED=1" >> $GITHUB_ENV
              exit 1
            fi
          else
            echo "Container already exists (ID: $CONTAINER_ID). No template specified, skipping update."
            echo "container_id=$CONTAINER_ID" >> $GITHUB_OUTPUT
            echo "container_ready=true" >> $GITHUB_OUTPUT
          fi
        else
          NEEDS_CREATE="true"
        fi

        if [ "$NEEDS_CREATE" == "true" ]; then
          echo "Creating container..."

          CREATE_PAYLOAD=$(jq -n \
            --arg hostname "$CONTAINER_NAME" \
            --arg template "$TEMPLATE_NAME" \
            --arg services "$SERVICES" \
            --arg env_vars "$CONTAINER_ENV_VARS" \
            '{
              hostname: $hostname,
              template: $template,
              services: ($services | fromjson? // []),
              environment: ($env_vars | fromjson? // {})
            }')

          echo "--- Create Payload ---"
          echo "$CREATE_PAYLOAD"
          echo "----------------------"

          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$API_URL/api/v1/sites/$SITE_ID/containers" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "$CREATE_PAYLOAD")

          CREATE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
          CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -1)

          if [ "$CREATE_CODE" -ge 200 ] && [ "$CREATE_CODE" -lt 300 ]; then
            echo "--- Create Response ---"
            echo "$CREATE_BODY"
            echo "----------------------"
            NEW_ID=$(echo "$CREATE_BODY" | jq -r '.data.containerId // .data.id // .container.id // .id // empty')
            JOB_ID=$(echo "$CREATE_BODY" | jq -r '.data.jobId // .data.job_id // .jobId // .job_id // empty')
            if [ -z "$NEW_ID" ] || [ "$NEW_ID" == "null" ]; then
              echo "::error::Container creation succeeded (HTTP $CREATE_CODE) but response contained no container ID. Response: $CREATE_BODY"
              echo "FAILED=1" >> $GITHUB_ENV
              exit 1
            fi
            echo "Container created successfully (ID: $NEW_ID, Job ID: ${JOB_ID:-none})."
            echo "container_id=$NEW_ID" >> $GITHUB_OUTPUT
            if [ -n "$JOB_ID" ] && [ "$JOB_ID" != "null" ]; then
              echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
              echo "container_created=true" >> $GITHUB_OUTPUT
            else
              echo "No job ID returned вЂ” container created synchronously."
              echo "container_ready=true" >> $GITHUB_OUTPUT
            fi
          elif [ "$CREATE_CODE" -eq 409 ]; then
            # Container already exists (race condition with concurrent workflow)
            EXISTING_ID=$(echo "$CREATE_BODY" | jq -r '.data.containerId // .data.id // .container.id // empty')
            echo "Container already exists (conflict). Using existing container ID: $EXISTING_ID"
            echo "container_id=$EXISTING_ID" >> $GITHUB_OUTPUT
            echo "container_ready=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Failed to create container. HTTP: $CREATE_CODE"
            echo "    Response: $CREATE_BODY"
            echo "FAILED=1" >> $GITHUB_ENV
            exit 1
          fi
        fi

    # в”Ђв”Ђ Phase 2: Wait for the creation job to finish в”Ђв”Ђ
    - name: Wait for Job to Complete
      id: wait-job
      shell: bash
      if: ${{ steps.manage-container.outputs.container_created == 'true' && env.FAILED != '1' }}
      env:
        API_URL: ${{ inputs.api_url }}
        API_KEY: ${{ inputs.api_key }}
        JOB_ID: ${{ steps.manage-container.outputs.job_id }}
        CONTAINER_NAME: ${{ steps.manage-container.outputs.container_name }}
      run: |
        if [ -z "$JOB_ID" ] || [ "$JOB_ID" == "null" ]; then
          echo "::error::Wait-for-job step reached but JOB_ID is empty. The create step did not capture a job ID."
          echo "FAILED=1" >> $GITHUB_ENV
          exit 1
        fi

        MAX_ATTEMPTS=30       # Total wait: up to ~5 minutes (30 Г— 10s)
        POLL_INTERVAL=10      # Seconds between checks
        ATTEMPT=0

        echo "Waiting for job $JOB_ID (container '$CONTAINER_NAME') to complete..."

        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          ATTEMPT=$((ATTEMPT + 1))

          RAW_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Accept: application/json" \
            "$API_URL/api/v1/jobs/$JOB_ID")

          HTTP_CODE=$(echo "$RAW_RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$RAW_RESPONSE" | sed '$d')

          echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS вЂ” HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "    API returned HTTP $HTTP_CODE"
            sleep $POLL_INTERVAL
            continue
          fi

          if ! echo "$RESPONSE_BODY" | jq empty 2>/dev/null; then
            echo "    Response is not valid JSON вЂ” retrying."
            sleep $POLL_INTERVAL
            continue
          fi

          JOB_STATUS=$(echo "$RESPONSE_BODY" | jq -r '.status // "unknown"')
          echo "    Job status: $JOB_STATUS"

          if [ "$JOB_STATUS" == "success" ] || [ "$JOB_STATUS" == "completed" ]; then
            echo "Job completed successfully."
            echo "job_done=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$JOB_STATUS" == "failed" ] || [ "$JOB_STATUS" == "error" ] || [ "$JOB_STATUS" == "cancelled" ]; then
            FAILURE_REASON=$(echo "$RESPONSE_BODY" | jq -r '.error // .message // .reason // empty')
            if [ -n "$FAILURE_REASON" ]; then
              echo "::error::Job entered '$JOB_STATUS' state: $FAILURE_REASON"
            else
              echo "::error::Job entered '$JOB_STATUS' state. Full response: $RESPONSE_BODY"
            fi
            echo "FAILED=1" >> $GITHUB_ENV
            exit 1
          fi

          # Job is still pending or running вЂ” keep polling
          sleep $POLL_INTERVAL
        done

        echo "::error::Timed out waiting for job to complete after $((MAX_ATTEMPTS * POLL_INTERVAL))s."
        echo "FAILED=1" >> $GITHUB_ENV
        exit 1

    # в”Ђв”Ђ Phase 3: Query the container for its final details в”Ђв”Ђ
    - name: Query Container Status
      id: container-status
      shell: bash
      if: ${{ (steps.manage-container.outputs.container_ready == 'true' || steps.wait-job.outputs.job_done == 'true') && env.FAILED != '1' }}
      env:
        API_URL: ${{ inputs.api_url }}
        API_KEY: ${{ inputs.api_key }}
        SITE_ID: ${{ inputs.site_id }}
        CONTAINER_NAME: ${{ steps.manage-container.outputs.container_name }}
      run: |
        echo "Querying container '$CONTAINER_NAME'..."

        RAW_RESPONSE=$(curl -s -w "\n%{http_code}" \
          -H "Authorization: Bearer $API_KEY" \
          -H "Accept: application/json" \
          "$API_URL/api/v1/sites/$SITE_ID/containers?hostname=$CONTAINER_NAME")

        HTTP_CODE=$(echo "$RAW_RESPONSE" | tail -1)
        RESPONSE_BODY=$(echo "$RAW_RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "::error::Failed to query container. HTTP $HTTP_CODE"
          echo "    Response: $RESPONSE_BODY"
          echo "FAILED=1" >> $GITHUB_ENV
          exit 1
        fi

        CONTAINER_STATUS=$(echo "$RESPONSE_BODY" | jq -r '.data[0].status // .containers[0].status // "unknown"')
        CONTAINER_IP=$(echo "$RESPONSE_BODY" | jq -r '.data[0].ipv4Address // .containers[0].ipv4Address // empty')
        SSH_PORT=$(echo "$RESPONSE_BODY" | jq -r '.data[0].sshPort // .containers[0].sshPort // empty')
        HTTP_PORT=$(echo "$RESPONSE_BODY" | jq -r '.data[0].httpPort // .containers[0].httpPort // empty')
        NODE_NAME=$(echo "$RESPONSE_BODY" | jq -r '.data[0].nodeName // .containers[0].nodeName // empty')

        echo ""
        echo "в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ"
        echo "  Container : $CONTAINER_NAME"
        echo "  Status    : $CONTAINER_STATUS"
        echo "  IP        : ${CONTAINER_IP:-pending}"
        echo "  SSH Port  : ${SSH_PORT:-N/A}"
        echo "  HTTP Port : ${HTTP_PORT:-N/A}"
        echo "  Node      : ${NODE_NAME:-unknown}"
        echo "в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ"
        echo ""

        if [ "$CONTAINER_STATUS" != "running" ]; then
          echo "::error::Container status is '$CONTAINER_STATUS', expected 'running'."
          exit 1
        fi

        echo "container_status=$CONTAINER_STATUS" >> $GITHUB_OUTPUT
        echo "container_ip=$CONTAINER_IP" >> $GITHUB_OUTPUT
        echo "ssh_port=$SSH_PORT" >> $GITHUB_OUTPUT
        echo "http_port=$HTTP_PORT" >> $GITHUB_OUTPUT

    # в”Ђв”Ђ Container Deletion on Branch Deletion в”Ђв”Ђ
    - name: Container Deletion on Branch Deletion
      shell: bash
      if: ${{ (github.event_name == 'delete' || (github.event_name == 'pull_request' && github.event.action == 'closed')) && steps.should-run.outputs.should_run == 'true' }}
      env:
        GITHUB_REPOSITORY_FULL: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        TARGET_BRANCH: ${{ steps.branch-name.outputs.target_branch }}
        API_KEY: ${{ inputs.api_key }}
        API_URL: ${{ inputs.api_url }}
        SITE_ID: ${{ inputs.site_id }}
      run: |
        REPO_NAME=$(basename "$GITHUB_REPOSITORY_FULL")
        CONTAINER_NAME="${GITHUB_REPOSITORY_OWNER}-${REPO_NAME}-${TARGET_BRANCH}"
        CONTAINER_NAME=${CONTAINER_NAME,,}
        CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')

        # Query /containers endpoint to get container.id using API Key authentication
        CONTAINERS_RESPONSE=$(curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" "$API_URL/api/v1/sites/$SITE_ID/containers?hostname=$CONTAINER_NAME")
        CONTAINER_ID=$(echo "$CONTAINERS_RESPONSE" | jq -r '.data[0].containerId // .data[0].id // .containers[0].id // empty')

        # DELETE /containers/:id
        if [ -n "$CONTAINER_ID" ] && [ "$CONTAINER_ID" != "null" ]; then
          DELETE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $API_KEY" -X DELETE "$API_URL/api/v1/sites/$SITE_ID/containers/$CONTAINER_ID")
          if [ "$DELETE_CODE" -eq 200 ] || [ "$DELETE_CODE" -eq 204 ]; then
             echo "Container $CONTAINER_NAME (ID: $CONTAINER_ID) has been deleted"
          else
             echo "::warning::Failed to delete container. HTTP: $DELETE_CODE"
          fi
        else
          echo "No container found to delete"
        fi

    - name: Catch All Failure Step
      if: env.FAILED == '1'
      shell: bash
      run: |
        echo "Workflow failed. See previous steps for details."
        exit 1
