name: MIEWeb LaunchPad
description: Manage Containers via the opensource-server Container API
author: mieweb
branding:
  icon: "package"
  color: "purple"

# LaunchPad is the launchpad-specific orchestrator: it derives a container name
# from the repository/branch, decides when to create/recreate/delete, and then
# delegates every API call to the reusable composite actions in
# mieweb/opensource-server/.github/actions/*.
#
# Pinning: `uses:` refs cannot be expressions, so the @latest refs below cannot
# inherit the ref this action was called with. To pin to a release, tag a
# matching LaunchPad release whose refs point at the same opensource-server tag.

inputs:
  api_key:
    description: "API Key for authentication"
    required: true
  api_url:
    description: "Base URL for the Container API"
    required: true
  template_name:
    description: "Container template (e.g., ghcr.io/mieweb/timeharbor:latest)"
    required: false
  container_env_vars:
    description: "Environment variables to set inside the container (JSON string)"
    required: false
  services:
    description: "Services configuration (JSON array)"
    required: false
  site_id:
    description: "Site ID for the container management system"
    required: false
    default: "1"

runs:
  using: "composite"
  steps:
    - name: Validate Required Inputs
      shell: bash
      env:
        API_KEY: ${{ inputs.api_key }}
        API_URL: ${{ inputs.api_url }}
      run: |
        missing=()
        [ -z "$API_KEY" ] && missing+=("api_key")
        [ -z "$API_URL" ] && missing+=("api_url")
        if [ ${#missing[@]} -gt 0 ]; then
          echo "::error::Missing required input(s): ${missing[*]}"
          exit 1
        fi

    - name: Check if action should run
      shell: bash
      id: should-run
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_CREATED: ${{ github.event.created }}
      run: |
        if [[ "$GITHUB_EVENT_NAME" != "push" ]] || [[ "$GITHUB_EVENT_CREATED" == "false" ]]; then
          echo "should_run=true" >> $GITHUB_OUTPUT
        else
          echo "should_run=false" >> $GITHUB_OUTPUT
          echo "Skipping action: Push event with created=true"
        fi

    - name: Classify Event
      shell: bash
      id: classify
      if: steps.should-run.outputs.should_run == 'true'
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_ACTION: ${{ github.event.action }}
      run: |
        manage=false
        delete=false
        case "$GITHUB_EVENT_NAME" in
          workflow_dispatch|create|push) manage=true ;;
          pull_request)
            if [ "$GITHUB_EVENT_ACTION" == "closed" ]; then delete=true; else manage=true; fi ;;
          delete) delete=true ;;
        esac
        echo "manage=$manage" >> $GITHUB_OUTPUT
        echo "delete=$delete" >> $GITHUB_OUTPUT

    - name: Determine Target Branch Name
      shell: bash
      id: branch-name
      if: steps.should-run.outputs.should_run == 'true'
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_EVENT_REF: ${{ github.event.ref }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
      run: |
        if [[ "$GITHUB_EVENT_NAME" == "delete" ]]; then
          TARGET_BRANCH="$GITHUB_EVENT_REF"
          echo "Using deleted branch name: $TARGET_BRANCH"
        elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
          TARGET_BRANCH="$GITHUB_HEAD_REF"
          echo "Using pull request head branch: $TARGET_BRANCH"
        else
          TARGET_BRANCH="$GITHUB_REF_NAME"
          echo "Using current branch name: $TARGET_BRANCH"
        fi
        echo "target_branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT

    - name: Prepare Container Name and Template
      shell: bash
      id: prepare
      if: steps.should-run.outputs.should_run == 'true'
      env:
        GITHUB_REPOSITORY_FULL: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        TARGET_BRANCH: ${{ steps.branch-name.outputs.target_branch }}
        TEMPLATE_NAME: ${{ inputs.template_name }}
      run: |
        # 1. Generate Container Name
        REPO_NAME=$(basename "$GITHUB_REPOSITORY_FULL")
        CONTAINER_NAME="${GITHUB_REPOSITORY_OWNER}-${REPO_NAME}-${TARGET_BRANCH}"
        CONTAINER_NAME=${CONTAINER_NAME,,}
        CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')

        # Truncate to 63 chars (DNS label limit): keep first 54 chars, append dash + 8-char hash of the rest
        if [ ${#CONTAINER_NAME} -gt 63 ]; then
          PART1="${CONTAINER_NAME:0:54}"
          PART2="${CONTAINER_NAME:54}"
          NAME_HASH=$(printf '%s' "$PART2" | sha256sum | cut -c1-8)
          CONTAINER_NAME="${PART1}-${NAME_HASH}"
        fi

        echo "container_name=$CONTAINER_NAME" >> $GITHUB_OUTPUT
        echo "Container: $CONTAINER_NAME"

        # 2. Normalize template tag: replace slashes with hyphens to match docker/metadata-action behavior
        if [[ "$TEMPLATE_NAME" == *:* ]]; then
          TEMPLATE_BASE="${TEMPLATE_NAME%:*}"
          TEMPLATE_TAG="${TEMPLATE_NAME##*:}"
          TEMPLATE_TAG=$(echo "$TEMPLATE_TAG" | sed 's|/|-|g')
          TEMPLATE_NAME="${TEMPLATE_BASE}:${TEMPLATE_TAG}"
        fi
        echo "template_name=$TEMPLATE_NAME" >> $GITHUB_OUTPUT

    # ── Phase 1: Create or locate the container ──
    - name: Locate Existing Container
      id: locate
      if: steps.classify.outputs.manage == 'true'
      uses: mieweb/opensource-server/.github/actions/get-container@latest
      with:
        api_url: ${{ inputs.api_url }}
        api_key: ${{ inputs.api_key }}
        site_id: ${{ inputs.site_id }}
        hostname: ${{ steps.prepare.outputs.container_name }}

